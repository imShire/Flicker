name: Build and Release Flicker DMG

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT: Flicker.xcodeproj
  TARGET: Flicker
  CONFIG: Release

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Show Xcode and SDK versions
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Clean build directory
        run: rm -rf build dist

      - name: Build Flicker app
        run: |
          set -o pipefail
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -target "${{ env.TARGET }}" \
            -configuration "${{ env.CONFIG }}" \
            -destination "platform=macOS" \
            CONFIGURATION_BUILD_DIR="$(pwd)/build" \
            build

      - name: Verify build products
        run: |
          ls -la build/
          test -d "build/Flicker.app" || (echo "Flicker.app not found" && exit 1)
          test -d "build/Flicker.app/Contents/PlugIns/FlickerExtension.appex" || \
            (echo "FlickerExtension.appex not found" && exit 1)

      - name: Extract app version
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" \
            "build/Flicker.app/Contents/Info.plist")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: $VERSION"

      - name: Create DMG staging
        run: |
          STAGING="build/dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "build/Flicker.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

      - name: Create DMG
        run: |
          mkdir -p dist
          DMG_PATH="dist/Flicker-${{ steps.version.outputs.version }}.dmg"
          hdiutil create -volname "Flicker" -srcfolder "build/dmg-staging" \
            -fs "HFS+" -format "UDZO" -imagekey "zlib-level=9" "$DMG_PATH"
          ls -lh "$DMG_PATH"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flicker-${{ steps.version.outputs.version }}
          path: dist/*.dmg
          if-no-files-found: error
