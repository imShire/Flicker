name: Build Flicker DMG

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Build and package DMG
        run: ./scripts/build_dmg.sh 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('dist/*.dmg') != ''
        with:
          name: Flicker-DMG
          path: dist/*.dmg
          if-no-files-found: ignore

      - name: Fail if DMG missing
        run: |
          if [ ! -f dist/*.dmg ]; then
            echo "::error::DMG was not produced. See job summary for build log details."
            echo "## Build failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Error lines" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            grep -n -E "error:|FAILED|Build failed|undefined" build.log | tail -n 50 >> "$GITHUB_STEP_SUMMARY" || true
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Build log tail" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            tail -n 80 build.log >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
