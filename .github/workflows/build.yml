name: Build Flicker DMG

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Build and package DMG
        run: ./scripts/build_dmg.sh 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('dist/*.dmg') != ''
        with:
          name: Flicker-DMG
          path: dist/*.dmg
          if-no-files-found: ignore

      - name: Fail if DMG missing
        run: |
          if [ ! -f dist/*.dmg ]; then
            echo "::error::DMG was not produced. Build log tail below:"
            tail -n 40 build.log | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit 1
          fi
